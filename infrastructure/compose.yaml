name: ems

services:
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
      args:
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
    volumes:
      - ../server:/app # bind mount → hot-reload
      - /app/.venv # anonymous volume → isolates the virtual environment from the host machine
    ports:
      - "8000:8000"
    environment:
      # Python
      - PYTHONUNBUFFERED=1
      # Postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      # InfluxDB
      - INFLUXDB_HOST=http://influxdb:8181
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_DATABASE=${INFLUXDB_DATABASE}
      # JWT
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      influxdb:
        condition: service_started

  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:3-core
    ports:
      - "8181:8181"
    command:
      - influxdb3
      - serve
      - --node-id=ems-node
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
    volumes:
      - influxdb_data:/var/lib/influxdb3

volumes:
  db_data:
  influxdb_data:
